kind = "web"
previewPath = "/"
title = "AI Investor"
version = "1.0.0"
id = "artifacts/ai-investor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26079

[services.development]
run = "pnpm --filter @workspace/ai-investor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-investor", "run", "build" ]
publicDir = "artifacts/ai-investor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26079"
BASE_PATH = "/"
